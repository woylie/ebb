name: Reuse

on:
  pull_request:
    branches: ["main"]

jobs:
  license-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
      - name: Run Reuse
        run: pipx run reuse lint
